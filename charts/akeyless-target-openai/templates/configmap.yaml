{{- if .Values.config }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "akeyless-target-openai.fullname" . }}
  labels:
    {{- include "akeyless-target-openai.labels" . | nindent 4 }}
data:
  api-key: {{ .Values.config.api_key | quote }}
  api-key-id: {{ .Values.config.api_key_id | quote }}
  description: {{ .Values.config.description | quote }}
  key: {{ .Values.config.key | quote }}
  max-versions: {{ .Values.config.max_versions | quote }}
  model: {{ .Values.config.model | quote }}
  name: {{ .Values.config.name | quote }}
  openai-url: {{ .Values.config.openai_url | quote }}
  organization-id: {{ .Values.config.organization_id | quote }}
{{- end }}
