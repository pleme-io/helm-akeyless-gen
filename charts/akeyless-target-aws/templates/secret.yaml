{{- if .Values.secrets }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "akeyless-target-aws.fullname" . }}
  labels:
    {{- include "akeyless-target-aws.labels" . | nindent 4 }}
type: Opaque
stringData:
  access-key: {{ .Values.secrets.access_key | quote }}
  access-key-id: {{ .Values.secrets.access_key_id | quote }}
  session-token: {{ .Values.secrets.session_token | quote }}
{{- end }}
