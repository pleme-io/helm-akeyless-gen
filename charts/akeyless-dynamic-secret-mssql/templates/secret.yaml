{{- if .Values.secrets }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "akeyless-dynamic-secret-mssql.fullname" . }}
  labels:
    {{- include "akeyless-dynamic-secret-mssql.labels" . | nindent 4 }}
type: Opaque
stringData:
  mssql-password: {{ .Values.secrets.mssql_password | quote }}
{{- end }}
