image:
  repository: ghcr.io/pleme-io/placeholder
  tag: latest
  pullPolicy: Always
replicaCount: 1
ports:
- name: http
  containerPort: 8080
  protocol: TCP
service:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
config:
  access_id: ''
  cluster_api_type: ''
  disable_issuer_validation: ''
  k8s_auth_type: ''
  k8s_ca_cert: ''
  k8s_client_certificate: ''
  k8s_client_key: ''
  k8s_host: ''
  k8s_issuer: ''
  name: ''
  rancher_api_key: ''
  rancher_cluster_id: ''
  signing_key: ''
  token_exp: 0
  token_reviewer_jwt: ''
  use_gw_service_account: false
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi
monitoring:
  enabled: true
  alerting:
    enabled: false
  interval: 30s
  port: metrics
  path: /metrics
networkPolicy:
  enabled: true
pdb:
  enabled: false
autoscaling:
  enabled: false
