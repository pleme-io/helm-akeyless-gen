image:
  repository: ghcr.io/pleme-io/placeholder
  tag: latest
  pullPolicy: Always
replicaCount: 1
ports:
- name: http
  containerPort: 8080
  protocol: TCP
service:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
config:
  delete_protection: false
  description: ''
  item_custom_fields: {}
  name: ''
  password_length: ''
  producer_encryption_key_name: ''
  rabbitmq_admin_pwd: ''
  rabbitmq_admin_user: ''
  rabbitmq_server_uri: ''
  rabbitmq_user_conf_permission: ''
  rabbitmq_user_read_permission: ''
  rabbitmq_user_tags: ''
  rabbitmq_user_vhost: ''
  rabbitmq_user_write_permission: ''
  tags: []
  target_name: ''
  user_ttl: ''
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi
monitoring:
  enabled: true
  alerting:
    enabled: false
  interval: 30s
  port: metrics
  path: /metrics
networkPolicy:
  enabled: true
pdb:
  enabled: false
autoscaling:
  enabled: false
