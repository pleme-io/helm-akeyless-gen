{{- if .Values.config }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "akeyless-dynamic-secret-k8s.fullname" . }}
  labels:
    {{- include "akeyless-dynamic-secret-k8s.labels" . | nindent 4 }}
data:
  custom-username-template: {{ .Values.config.custom_username_template | quote }}
  delete-protection: {{ .Values.config.delete_protection | quote }}
  description: {{ .Values.config.description | quote }}
  item-custom-fields: {{ .Values.config.item_custom_fields | toJson | quote }}
  k8s-allowed-namespaces: {{ .Values.config.k8s_allowed_namespaces | quote }}
  k8s-cluster-endpoint: {{ .Values.config.k8s_cluster_endpoint | quote }}
  k8s-cluster-name: {{ .Values.config.k8s_cluster_name | quote }}
  k8s-namespace: {{ .Values.config.k8s_namespace | quote }}
  k8s-predefined-role-name: {{ .Values.config.k8s_predefined_role_name | quote }}
  k8s-predefined-role-type: {{ .Values.config.k8s_predefined_role_type | quote }}
  k8s-rolebinding-yaml-data: {{ .Values.config.k8s_rolebinding_yaml_data | quote }}
  k8s-rolebinding-yaml-def: {{ .Values.config.k8s_rolebinding_yaml_def | quote }}
  k8s-service-account: {{ .Values.config.k8s_service_account | quote }}
  k8s-service-account-type: {{ .Values.config.k8s_service_account_type | quote }}
  name: {{ .Values.config.name | quote }}
  producer-encryption-key-name: {{ .Values.config.producer_encryption_key_name | quote }}
  secure-access-allow-port-forwading: {{ .Values.config.secure_access_allow_port_forwading | quote }}
  secure-access-cluster-endpoint: {{ .Values.config.secure_access_cluster_endpoint | quote }}
  secure-access-dashboard-url: {{ .Values.config.secure_access_dashboard_url | quote }}
  secure-access-delay: {{ .Values.config.secure_access_delay | quote }}
  tags: {{ .Values.config.tags | toJson | quote }}
  target-name: {{ .Values.config.target_name | quote }}
  use-gw-service-account: {{ .Values.config.use_gw_service_account | quote }}
  user-ttl: {{ .Values.config.user_ttl | quote }}
{{- end }}
