{{- if .Values.secrets }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "akeyless-dynamic-secret-venafi.fullname" . }}
  labels:
    {{- include "akeyless-dynamic-secret-venafi.labels" . | nindent 4 }}
type: Opaque
stringData:
  venafi-api-key: {{ .Values.secrets.venafi_api_key | quote }}
{{- end }}
