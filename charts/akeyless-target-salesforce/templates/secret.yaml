{{- if .Values.secrets }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "akeyless-target-salesforce.fullname" . }}
  labels:
    {{- include "akeyless-target-salesforce.labels" . | nindent 4 }}
type: Opaque
stringData:
  client-secret: {{ .Values.secrets.client_secret | quote }}
  security-token: {{ .Values.secrets.security_token | quote }}
{{- end }}
