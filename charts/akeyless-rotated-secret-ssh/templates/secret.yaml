{{- if .Values.secrets }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "akeyless-rotated-secret-ssh.fullname" . }}
  labels:
    {{- include "akeyless-rotated-secret-ssh.labels" . | nindent 4 }}
type: Opaque
stringData:
  key-data-base64: {{ .Values.secrets.key_data_base64 | quote }}
  rotated-password: {{ .Values.secrets.rotated_password | quote }}
{{- end }}
