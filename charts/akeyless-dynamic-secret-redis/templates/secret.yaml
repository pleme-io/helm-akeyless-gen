{{- if .Values.secrets }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "akeyless-dynamic-secret-redis.fullname" . }}
  labels:
    {{- include "akeyless-dynamic-secret-redis.labels" . | nindent 4 }}
type: Opaque
stringData:
  ssl-certificate: {{ .Values.secrets.ssl_certificate | quote }}
{{- end }}
