{{- if .Values.config }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "akeyless-dynamic-secret-azure.fullname" . }}
  labels:
    {{- include "akeyless-dynamic-secret-azure.labels" . | nindent 4 }}
data:
  app-obj-id: {{ .Values.config.app_obj_id | quote }}
  azure-administrative-unit: {{ .Values.config.azure_administrative_unit | quote }}
  azure-client-id: {{ .Values.config.azure_client_id | quote }}
  azure-tenant-id: {{ .Values.config.azure_tenant_id | quote }}
  custom-username-template: {{ .Values.config.custom_username_template | quote }}
  delete-protection: {{ .Values.config.delete_protection | quote }}
  description: {{ .Values.config.description | quote }}
  fixed-user-claim-keyname: {{ .Values.config.fixed_user_claim_keyname | quote }}
  fixed-user-only: {{ .Values.config.fixed_user_only | quote }}
  item-custom-fields: {{ .Values.config.item_custom_fields | quote }}
  name: {{ .Values.config.name | quote }}
  password-length: {{ .Values.config.password_length | quote }}
  producer-encryption-key-name: {{ .Values.config.producer_encryption_key_name | quote }}
  tags: {{ .Values.config.tags | quote }}
  target-name: {{ .Values.config.target_name | quote }}
  user-group-obj-id: {{ .Values.config.user_group_obj_id | quote }}
  user-portal-access: {{ .Values.config.user_portal_access | quote }}
  user-principal-name: {{ .Values.config.user_principal_name | quote }}
  user-programmatic-access: {{ .Values.config.user_programmatic_access | quote }}
  user-role-template-id: {{ .Values.config.user_role_template_id | quote }}
  user-ttl: {{ .Values.config.user_ttl | quote }}
{{- end }}
