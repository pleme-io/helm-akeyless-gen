image:
  repository: ghcr.io/pleme-io/placeholder
  tag: latest
  pullPolicy: Always
replicaCount: 1
ports:
- name: http
  containerPort: 8080
  protocol: TCP
service:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
config:
  ProviderType: ''
  bind_dn: ''
  custom_username_template: ''
  delete_protection: false
  description: ''
  external_username: ''
  fixed_user_claim_keyname: ''
  group_dn: ''
  host_provider: ''
  item_custom_fields: {}
  ldap_ca_cert: ''
  ldap_url: ''
  name: ''
  password_length: ''
  producer_encryption_key_name: ''
  secure_access_delay: 0
  secure_access_rd_gateway_server: ''
  tags: []
  target: []
  target_name: ''
  token_expiration: ''
  user_attribute: ''
  user_dn: ''
  user_ttl: ''
secrets:
  bind_dn_password: ''
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi
monitoring:
  enabled: true
  alerting:
    enabled: false
  interval: 30s
  port: metrics
  path: /metrics
networkPolicy:
  enabled: true
pdb:
  enabled: false
autoscaling:
  enabled: false
