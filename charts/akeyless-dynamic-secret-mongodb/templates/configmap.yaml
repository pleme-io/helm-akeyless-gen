{{- if .Values.config }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "akeyless-dynamic-secret-mongodb.fullname" . }}
  labels:
    {{- include "akeyless-dynamic-secret-mongodb.labels" . | nindent 4 }}
data:
  custom-username-template: {{ .Values.config.custom_username_template | quote }}
  delete-protection: {{ .Values.config.delete_protection | quote }}
  description: {{ .Values.config.description | quote }}
  item-custom-fields: {{ .Values.config.item_custom_fields | toJson | quote }}
  mongodb-atlas-api-public-key: {{ .Values.config.mongodb_atlas_api_public_key | quote }}
  mongodb-atlas-project-id: {{ .Values.config.mongodb_atlas_project_id | quote }}
  mongodb-custom-data: {{ .Values.config.mongodb_custom_data | quote }}
  mongodb-default-auth-db: {{ .Values.config.mongodb_default_auth_db | quote }}
  mongodb-host-port: {{ .Values.config.mongodb_host_port | quote }}
  mongodb-name: {{ .Values.config.mongodb_name | quote }}
  mongodb-roles: {{ .Values.config.mongodb_roles | quote }}
  mongodb-scopes: {{ .Values.config.mongodb_scopes | quote }}
  mongodb-server-uri: {{ .Values.config.mongodb_server_uri | quote }}
  mongodb-uri-options: {{ .Values.config.mongodb_uri_options | quote }}
  mongodb-username: {{ .Values.config.mongodb_username | quote }}
  name: {{ .Values.config.name | quote }}
  password-length: {{ .Values.config.password_length | quote }}
  producer-encryption-key-name: {{ .Values.config.producer_encryption_key_name | quote }}
  secure-access-delay: {{ .Values.config.secure_access_delay | quote }}
  tags: {{ .Values.config.tags | toJson | quote }}
  target-name: {{ .Values.config.target_name | quote }}
  user-ttl: {{ .Values.config.user_ttl | quote }}
{{- end }}
