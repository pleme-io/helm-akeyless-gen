{{- if .Values.secrets }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "akeyless-auth-method-gcp.fullname" . }}
  labels:
    {{- include "akeyless-auth-method-gcp.labels" . | nindent 4 }}
type: Opaque
stringData:
  service-account-creds-data: {{ .Values.secrets.service_account_creds_data | quote }}
{{- end }}
