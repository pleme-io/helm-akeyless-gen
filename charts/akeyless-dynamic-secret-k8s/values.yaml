image:
  repository: ghcr.io/pleme-io/placeholder
  tag: latest
  pullPolicy: Always
replicaCount: 1
ports:
- name: http
  containerPort: 8080
  protocol: TCP
service:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
config:
  custom_username_template: ''
  delete_protection: false
  description: ''
  item_custom_fields: {}
  k8s_allowed_namespaces: ''
  k8s_cluster_endpoint: ''
  k8s_cluster_name: ''
  k8s_namespace: ''
  k8s_predefined_role_name: ''
  k8s_predefined_role_type: ''
  k8s_rolebinding_yaml_data: ''
  k8s_rolebinding_yaml_def: ''
  k8s_service_account: ''
  k8s_service_account_type: ''
  name: ''
  producer_encryption_key_name: ''
  secure_access_allow_port_forwading: false
  secure_access_cluster_endpoint: ''
  secure_access_dashboard_url: ''
  secure_access_delay: 0
  tags: []
  target_name: ''
  use_gw_service_account: false
  user_ttl: ''
secrets:
  k8s_cluster_ca_cert: ''
  k8s_cluster_token: ''
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi
monitoring:
  enabled: true
  alerting:
    enabled: false
  interval: 30s
  port: metrics
  path: /metrics
networkPolicy:
  enabled: true
pdb:
  enabled: false
autoscaling:
  enabled: false
