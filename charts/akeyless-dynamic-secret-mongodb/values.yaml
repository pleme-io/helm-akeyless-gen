image:
  repository: ghcr.io/pleme-io/placeholder
  tag: latest
  pullPolicy: Always
replicaCount: 1
ports:
- name: http
  containerPort: 8080
  protocol: TCP
service:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
config:
  custom_username_template: ''
  delete_protection: false
  description: ''
  item_custom_fields: {}
  mongodb_atlas_api_public_key: ''
  mongodb_atlas_project_id: ''
  mongodb_custom_data: ''
  mongodb_default_auth_db: ''
  mongodb_host_port: ''
  mongodb_name: ''
  mongodb_roles: ''
  mongodb_scopes: ''
  mongodb_server_uri: ''
  mongodb_uri_options: ''
  mongodb_username: ''
  name: ''
  password_length: ''
  producer_encryption_key_name: ''
  secure_access_delay: 0
  tags: []
  target_name: ''
  user_ttl: ''
secrets:
  mongodb_atlas_api_private_key: ''
  mongodb_password: ''
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi
monitoring:
  enabled: true
  alerting:
    enabled: false
  interval: 30s
  port: metrics
  path: /metrics
networkPolicy:
  enabled: true
pdb:
  enabled: false
autoscaling:
  enabled: false
