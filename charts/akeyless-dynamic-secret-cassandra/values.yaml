image:
  repository: ghcr.io/pleme-io/placeholder
  tag: latest
  pullPolicy: Always
replicaCount: 1
ports:
- name: http
  containerPort: 8080
  protocol: TCP
service:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
config:
  cassandra_creation_statements: ''
  cassandra_hosts: ''
  cassandra_port: ''
  cassandra_username: ''
  custom_username_template: ''
  delete_protection: false
  description: ''
  item_custom_fields: {}
  name: ''
  password_length: ''
  producer_encryption_key_name: ''
  ssl: false
  tags: []
  target_name: ''
  user_ttl: ''
secrets:
  cassandra_password: ''
  ssl_certificate: ''
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi
monitoring:
  enabled: true
  alerting:
    enabled: false
  interval: 30s
  port: metrics
  path: /metrics
networkPolicy:
  enabled: true
pdb:
  enabled: false
autoscaling:
  enabled: false
