{{- if .Values.config }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "akeyless-target-gitlab.fullname" . }}
  labels:
    {{- include "akeyless-target-gitlab.labels" . | nindent 4 }}
data:
  description: {{ .Values.config.description | quote }}
  gitlab-url: {{ .Values.config.gitlab_url | quote }}
  key: {{ .Values.config.key | quote }}
  max-versions: {{ .Values.config.max_versions | quote }}
  name: {{ .Values.config.name | quote }}
{{- end }}
