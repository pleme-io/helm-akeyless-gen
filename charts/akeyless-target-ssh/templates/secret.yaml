{{- if .Values.secrets }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "akeyless-target-ssh.fullname" . }}
  labels:
    {{- include "akeyless-target-ssh.labels" . | nindent 4 }}
type: Opaque
stringData:
  private-key: {{ .Values.secrets.private_key | quote }}
  private-key-password: {{ .Values.secrets.private_key_password | quote }}
  ssh-password: {{ .Values.secrets.ssh_password | quote }}
{{- end }}
