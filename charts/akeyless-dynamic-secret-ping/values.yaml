image:
  repository: ghcr.io/pleme-io/placeholder
  tag: latest
  pullPolicy: Always
replicaCount: 1
ports:
- name: http
  containerPort: 8080
  protocol: TCP
service:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
config:
  delete_protection: false
  description: ''
  item_custom_fields: {}
  name: ''
  ping_administrative_port: ''
  ping_atm_id: ''
  ping_authorization_port: ''
  ping_cert_subject_dn: ''
  ping_client_authentication_type: ''
  ping_enforce_replay_prevention: ''
  ping_grant_types: []
  ping_issuer_dn: ''
  ping_jwks: ''
  ping_jwks_url: ''
  ping_privileged_user: ''
  ping_redirect_uris: []
  ping_restricted_scopes: []
  ping_signing_algo: ''
  ping_url: ''
  producer_encryption_key_name: ''
  tags: []
  target_name: ''
  user_ttl: ''
secrets:
  ping_password: ''
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi
monitoring:
  enabled: true
  alerting:
    enabled: false
  interval: 30s
  port: metrics
  path: /metrics
networkPolicy:
  enabled: true
pdb:
  enabled: false
autoscaling:
  enabled: false
