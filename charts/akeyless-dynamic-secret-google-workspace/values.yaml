image:
  repository: ghcr.io/pleme-io/placeholder
  tag: latest
  pullPolicy: Always
replicaCount: 1
ports:
- name: http
  containerPort: 8080
  protocol: TCP
service:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
config:
  access_mode: ''
  admin_email: ''
  delete_protection: false
  description: ''
  fixed_user_claim_keyname: ''
  gcp_key: ''
  group_email: ''
  group_role: ''
  item_custom_fields: {}
  name: ''
  producer_encryption_key_name: ''
  role_name: ''
  role_scope: ''
  secure_access_delay: 0
  tags: []
  target_name: ''
  user_ttl: ''
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi
monitoring:
  enabled: true
  alerting:
    enabled: false
  interval: 30s
  port: metrics
  path: /metrics
networkPolicy:
  enabled: true
pdb:
  enabled: false
autoscaling:
  enabled: false
