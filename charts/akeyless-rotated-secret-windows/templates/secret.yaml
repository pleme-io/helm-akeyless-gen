{{- if .Values.secrets }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "akeyless-rotated-secret-windows.fullname" . }}
  labels:
    {{- include "akeyless-rotated-secret-windows.labels" . | nindent 4 }}
type: Opaque
stringData:
  rotated-password: {{ .Values.secrets.rotated_password | quote }}
{{- end }}
