image:
  repository: ghcr.io/pleme-io/placeholder
  tag: latest
  pullPolicy: Always
replicaCount: 1
ports:
- name: http
  containerPort: 8080
  protocol: TCP
service:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
config:
  custom_username_template: ''
  delete_protection: false
  description: ''
  item_custom_fields: {}
  mssql_allowed_db_names: ''
  mssql_create_statements: ''
  mssql_dbname: ''
  mssql_host: ''
  mssql_port: ''
  mssql_revocation_statements: ''
  mssql_username: ''
  name: ''
  password_length: ''
  producer_encryption_key_name: ''
  secure_access_delay: 0
  tags: []
  target_name: ''
  user_ttl: ''
secrets:
  mssql_password: ''
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi
monitoring:
  enabled: true
  alerting:
    enabled: false
  interval: 30s
  port: metrics
  path: /metrics
networkPolicy:
  enabled: true
pdb:
  enabled: false
autoscaling:
  enabled: false
