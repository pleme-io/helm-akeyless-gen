{{- if .Values.secrets }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "akeyless-dynamic-secret-github.fullname" . }}
  labels:
    {{- include "akeyless-dynamic-secret-github.labels" . | nindent 4 }}
type: Opaque
stringData:
  github-app-private-key: {{ .Values.secrets.github_app_private_key | quote }}
{{- end }}
