{{- if .Values.secrets }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "akeyless-rotated-secret-custom.fullname" . }}
  labels:
    {{- include "akeyless-rotated-secret-custom.labels" . | nindent 4 }}
type: Opaque
stringData:
  custom-payload: {{ .Values.secrets.custom_payload | quote }}
{{- end }}
