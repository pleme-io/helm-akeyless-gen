image:
  repository: ghcr.io/pleme-io/placeholder
  tag: latest
  pullPolicy: Always
replicaCount: 1
ports:
- name: http
  containerPort: 8080
  protocol: TCP
service:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
config:
  access_expires: 0
  allowed_client_type: []
  audit_logs_claims: []
  auth_url: ''
  bound_domain_id: []
  bound_domain_name: []
  bound_ips: []
  bound_tenant_id: []
  bound_tenant_name: []
  bound_user_id: []
  bound_user_name: []
  delete_protection: ''
  description: ''
  expiration_event_in: []
  force_sub_claims: false
  gw_bound_ips: []
  jwt_ttl: 0
  name: ''
  product_type: []
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi
monitoring:
  enabled: true
  alerting:
    enabled: false
  interval: 30s
  port: metrics
  path: /metrics
networkPolicy:
  enabled: true
pdb:
  enabled: false
autoscaling:
  enabled: false
