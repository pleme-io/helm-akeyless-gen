image:
  repository: ghcr.io/pleme-io/placeholder
  tag: latest
  pullPolicy: Always
replicaCount: 1
ports:
- name: http
  containerPort: 8080
  protocol: TCP
service:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
config:
  ProviderType: ''
  allowed_users: ''
  delete_protection: false
  description: ''
  extensions: {}
  external_username: ''
  fixed_user_claim_keyname: ''
  host_provider: ''
  name: ''
  principals: ''
  secure_access_use_internal_ssh_access: false
  signer_key_name: ''
  tag: []
  target: []
  ttl: 0
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi
monitoring:
  enabled: true
  alerting:
    enabled: false
  interval: 30s
  port: metrics
  path: /metrics
networkPolicy:
  enabled: true
pdb:
  enabled: false
autoscaling:
  enabled: false
