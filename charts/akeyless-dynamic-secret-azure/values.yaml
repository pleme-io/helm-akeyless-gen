image:
  repository: ghcr.io/pleme-io/placeholder
  tag: latest
  pullPolicy: Always
replicaCount: 1
ports:
- name: http
  containerPort: 8080
  protocol: TCP
service:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
config:
  app_obj_id: ''
  azure_administrative_unit: ''
  azure_client_id: ''
  azure_tenant_id: ''
  custom_username_template: ''
  delete_protection: false
  description: ''
  fixed_user_claim_keyname: ''
  fixed_user_only: false
  item_custom_fields: {}
  name: ''
  password_length: ''
  producer_encryption_key_name: ''
  tags: []
  target_name: ''
  user_group_obj_id: ''
  user_portal_access: false
  user_principal_name: ''
  user_programmatic_access: false
  user_role_template_id: ''
  user_ttl: ''
secrets:
  azure_client_secret: ''
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi
monitoring:
  enabled: true
  alerting:
    enabled: false
  interval: 30s
  port: metrics
  path: /metrics
networkPolicy:
  enabled: true
pdb:
  enabled: false
autoscaling:
  enabled: false
