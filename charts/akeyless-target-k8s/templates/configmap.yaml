{{- if .Values.config }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "akeyless-target-k8s.fullname" . }}
  labels:
    {{- include "akeyless-target-k8s.labels" . | nindent 4 }}
data:
  description: {{ .Values.config.description | quote }}
  k8s-auth-type: {{ .Values.config.k8s_auth_type | quote }}
  k8s-cluster-endpoint: {{ .Values.config.k8s_cluster_endpoint | quote }}
  k8s-cluster-name: {{ .Values.config.k8s_cluster_name | quote }}
  key: {{ .Values.config.key | quote }}
  max-versions: {{ .Values.config.max_versions | quote }}
  name: {{ .Values.config.name | quote }}
  use-gw-service-account: {{ .Values.config.use_gw_service_account | quote }}
{{- end }}
