{{- if .Values.secrets }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "akeyless-auth-method-oidc.fullname" . }}
  labels:
    {{- include "akeyless-auth-method-oidc.labels" . | nindent 4 }}
type: Opaque
stringData:
  client-secret: {{ .Values.secrets.client_secret | quote }}
{{- end }}
