image:
  repository: ghcr.io/pleme-io/placeholder
  tag: latest
  pullPolicy: Always
replicaCount: 1
ports:
- name: http
  containerPort: 8080
  protocol: TCP
service:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
config:
  alg: ''
  auto_rotate: ''
  certificate_common_name: ''
  certificate_country: ''
  certificate_digest_algo: ''
  certificate_format: ''
  certificate_locality: ''
  certificate_organization: ''
  certificate_province: ''
  certificate_ttl: 0
  delete_protection: false
  description: ''
  expiration_event_in: []
  generate_self_signed_certificate: false
  gpg_alg: ''
  hash_algorithm: ''
  item_custom_fields: {}
  name: ''
  protection_key_name: ''
  rotation_event_in: []
  rotation_interval: ''
  tags: []
secrets:
  cert_file_data: ''
  key_data: ''
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi
monitoring:
  enabled: true
  alerting:
    enabled: false
  interval: 30s
  port: metrics
  path: /metrics
networkPolicy:
  enabled: true
pdb:
  enabled: false
autoscaling:
  enabled: false
