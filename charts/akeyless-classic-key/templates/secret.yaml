{{- if .Values.secrets }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "akeyless-classic-key.fullname" . }}
  labels:
    {{- include "akeyless-classic-key.labels" . | nindent 4 }}
type: Opaque
stringData:
  cert-file-data: {{ .Values.secrets.cert_file_data | quote }}
  key-data: {{ .Values.secrets.key_data | quote }}
{{- end }}
