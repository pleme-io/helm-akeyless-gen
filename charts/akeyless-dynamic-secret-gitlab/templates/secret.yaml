{{- if .Values.secrets }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "akeyless-dynamic-secret-gitlab.fullname" . }}
  labels:
    {{- include "akeyless-dynamic-secret-gitlab.labels" . | nindent 4 }}
type: Opaque
stringData:
  gitlab-access-token: {{ .Values.secrets.gitlab_access_token | quote }}
  gitlab-certificate: {{ .Values.secrets.gitlab_certificate | quote }}
{{- end }}
