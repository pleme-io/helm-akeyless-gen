{{- if .Values.secrets }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "akeyless-dynamic-secret-hanadb.fullname" . }}
  labels:
    {{- include "akeyless-dynamic-secret-hanadb.labels" . | nindent 4 }}
type: Opaque
stringData:
  hanadb-password: {{ .Values.secrets.hanadb_password | quote }}
{{- end }}
