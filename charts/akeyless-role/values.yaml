image:
  repository: ghcr.io/pleme-io/placeholder
  tag: latest
  pullPolicy: Always
replicaCount: 1
ports:
- name: http
  containerPort: 8080
  protocol: TCP
service:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
config:
  analytics_access: ''
  audit_access: ''
  comment: ''
  delete_protection: ''
  description: ''
  event_center_access: ''
  event_forwarders_access: ''
  event_forwarders_name: []
  gw_analytics_access: ''
  name: ''
  reverse_rbac_access: ''
  sra_reports_access: ''
  usage_reports_access: ''
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi
monitoring:
  enabled: true
  alerting:
    enabled: false
  interval: 30s
  port: metrics
  path: /metrics
networkPolicy:
  enabled: true
pdb:
  enabled: false
autoscaling:
  enabled: false
