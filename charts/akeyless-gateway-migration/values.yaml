image:
  repository: ghcr.io/pleme-io/placeholder
  tag: latest
  pullPolicy: Always
replicaCount: 1
ports:
- name: http
  containerPort: 8080
  protocol: TCP
service:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
config:
  ServiceAccountKeyDecoded: ''
  ad_auto_rotate: ''
  ad_cert_expiration_event_in: []
  ad_certificates_path_template: ''
  ad_computer_base_dn: ''
  ad_discover_iis_app: ''
  ad_discover_local_users: ''
  ad_discover_services: ''
  ad_discovery_types: []
  ad_domain_name: ''
  ad_domain_users_path_template: ''
  ad_local_users_ignore: ''
  ad_local_users_path_template: ''
  ad_os_filter: ''
  ad_rotation_hour: 0
  ad_rotation_interval: 0
  ad_sra_enable_rdp: ''
  ad_ssh_port: ''
  ad_target_format: ''
  ad_target_name: ''
  ad_targets_path_template: ''
  ad_targets_type: ''
  ad_user_base_dn: ''
  ad_user_groups: ''
  ad_winrm_over_http: ''
  ad_winrm_port: ''
  ai_certificate_discovery: ''
  aws_key: ''
  aws_key_id: ''
  aws_region: ''
  azure_client_id: ''
  azure_kv_name: ''
  azure_secret: ''
  azure_tenant_id: ''
  conjur_account: ''
  conjur_api_key: ''
  conjur_url: ''
  conjur_username: ''
  expiration_event_in: []
  gcp_key: ''
  gcp_project_id: ''
  hashi_json: ''
  hashi_ns: []
  hashi_token: ''
  hashi_url: ''
  hosts: ''
  k8s_ca_certificate: []
  k8s_client_certificate: []
  k8s_client_key: []
  k8s_namespace: ''
  k8s_password: ''
  k8s_skip_system: false
  k8s_token: ''
  k8s_url: ''
  k8s_username: ''
  name: ''
  port_ranges: ''
  protection_key: ''
  si_auto_rotate: ''
  si_rotation_hour: 0
  si_rotation_interval: 0
  si_sra_enable_rdp: ''
  si_target_name: ''
  si_user_groups: ''
  si_users_ignore: ''
  si_users_path_template: ''
  target_location: ''
  type: ''
  use_gw_cloud_identity: false
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi
monitoring:
  enabled: true
  alerting:
    enabled: false
  interval: 30s
  port: metrics
  path: /metrics
networkPolicy:
  enabled: true
pdb:
  enabled: false
autoscaling:
  enabled: false
