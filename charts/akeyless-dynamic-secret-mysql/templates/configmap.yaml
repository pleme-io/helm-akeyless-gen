{{- if .Values.config }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "akeyless-dynamic-secret-mysql.fullname" . }}
  labels:
    {{- include "akeyless-dynamic-secret-mysql.labels" . | nindent 4 }}
data:
  custom-username-template: {{ .Values.config.custom_username_template | quote }}
  db-server-name: {{ .Values.config.db_server_name | quote }}
  delete-protection: {{ .Values.config.delete_protection | quote }}
  description: {{ .Values.config.description | quote }}
  item-custom-fields: {{ .Values.config.item_custom_fields | toJson | quote }}
  mysql-dbname: {{ .Values.config.mysql_dbname | quote }}
  mysql-host: {{ .Values.config.mysql_host | quote }}
  mysql-port: {{ .Values.config.mysql_port | quote }}
  mysql-revocation-statements: {{ .Values.config.mysql_revocation_statements | quote }}
  mysql-screation-statements: {{ .Values.config.mysql_screation_statements | quote }}
  mysql-username: {{ .Values.config.mysql_username | quote }}
  name: {{ .Values.config.name | quote }}
  password-length: {{ .Values.config.password_length | quote }}
  producer-encryption-key-name: {{ .Values.config.producer_encryption_key_name | quote }}
  secure-access-delay: {{ .Values.config.secure_access_delay | quote }}
  ssl: {{ .Values.config.ssl | quote }}
  tags: {{ .Values.config.tags | toJson | quote }}
  target-name: {{ .Values.config.target_name | quote }}
  user-ttl: {{ .Values.config.user_ttl | quote }}
{{- end }}
