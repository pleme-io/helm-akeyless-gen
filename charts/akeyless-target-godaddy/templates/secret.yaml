{{- if .Values.secrets }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "akeyless-target-godaddy.fullname" . }}
  labels:
    {{- include "akeyless-target-godaddy.labels" . | nindent 4 }}
type: Opaque
stringData:
  api-key: {{ .Values.secrets.api_key | quote }}
  imap-password: {{ .Values.secrets.imap_password | quote }}
  secret: {{ .Values.secrets.secret | quote }}
{{- end }}
