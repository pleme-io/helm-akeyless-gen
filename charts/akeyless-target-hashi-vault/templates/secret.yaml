{{- if .Values.secrets }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "akeyless-target-hashi-vault.fullname" . }}
  labels:
    {{- include "akeyless-target-hashi-vault.labels" . | nindent 4 }}
type: Opaque
stringData:
  vault-token: {{ .Values.secrets.vault_token | quote }}
{{- end }}
