{{- if .Values.secrets }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "akeyless-target-db.fullname" . }}
  labels:
    {{- include "akeyless-target-db.labels" . | nindent 4 }}
type: Opaque
stringData:
  db-server-certificates: {{ .Values.secrets.db_server_certificates | quote }}
  mongodb-atlas-api-private-key: {{ .Values.secrets.mongodb_atlas_api_private_key | quote }}
  pwd: {{ .Values.secrets.pwd | quote }}
  ssl-certificate: {{ .Values.secrets.ssl_certificate | quote }}
{{- end }}
