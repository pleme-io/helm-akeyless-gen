image:
  repository: ghcr.io/pleme-io/placeholder
  tag: latest
  pullPolicy: Always
replicaCount: 1
ports:
- name: http
  containerPort: 8080
  protocol: TCP
service:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
config:
  ProviderType: ''
  authentication_credentials: ''
  auto_rotate: ''
  delete_protection: false
  description: ''
  host_provider: ''
  key: ''
  max_versions: ''
  name: ''
  password_length: ''
  rotate_after_disconnect: ''
  rotated_username: ''
  rotation_event_in: []
  rotation_hour: 0
  rotation_interval: ''
  rotator_type: ''
  tags: []
  target: []
  target_name: ''
  user_attribute: ''
  user_dn: ''
secrets:
  rotated_password: ''
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi
monitoring:
  enabled: true
  alerting:
    enabled: false
  interval: 30s
  port: metrics
  path: /metrics
networkPolicy:
  enabled: true
pdb:
  enabled: false
autoscaling:
  enabled: false
