{{- if .Values.config }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "akeyless-dynamic-secret-rabbitmq.fullname" . }}
  labels:
    {{- include "akeyless-dynamic-secret-rabbitmq.labels" . | nindent 4 }}
data:
  delete-protection: {{ .Values.config.delete_protection | quote }}
  description: {{ .Values.config.description | quote }}
  item-custom-fields: {{ .Values.config.item_custom_fields | quote }}
  name: {{ .Values.config.name | quote }}
  password-length: {{ .Values.config.password_length | quote }}
  producer-encryption-key-name: {{ .Values.config.producer_encryption_key_name | quote }}
  rabbitmq-admin-pwd: {{ .Values.config.rabbitmq_admin_pwd | quote }}
  rabbitmq-admin-user: {{ .Values.config.rabbitmq_admin_user | quote }}
  rabbitmq-server-uri: {{ .Values.config.rabbitmq_server_uri | quote }}
  rabbitmq-user-conf-permission: {{ .Values.config.rabbitmq_user_conf_permission | quote }}
  rabbitmq-user-read-permission: {{ .Values.config.rabbitmq_user_read_permission | quote }}
  rabbitmq-user-tags: {{ .Values.config.rabbitmq_user_tags | quote }}
  rabbitmq-user-vhost: {{ .Values.config.rabbitmq_user_vhost | quote }}
  rabbitmq-user-write-permission: {{ .Values.config.rabbitmq_user_write_permission | quote }}
  tags: {{ .Values.config.tags | quote }}
  target-name: {{ .Values.config.target_name | quote }}
  user-ttl: {{ .Values.config.user_ttl | quote }}
{{- end }}
