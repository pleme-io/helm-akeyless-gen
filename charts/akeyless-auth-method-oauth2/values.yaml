image:
  repository: ghcr.io/pleme-io/placeholder
  tag: latest
  pullPolicy: Always
replicaCount: 1
ports:
- name: http
  containerPort: 8080
  protocol: TCP
service:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
config:
  access_expires: 0
  allowed_client_type: []
  audience: ''
  audit_logs_claims: []
  bound_client_ids: []
  bound_ips: []
  cert: ''
  cert_file_data: ''
  delete_protection: false
  description: ''
  expiration_event_in: []
  force_sub_claims: false
  gateway_url: ''
  gw_bound_ips: []
  issuer: ''
  jwks_json_data: ''
  jwks_uri: ''
  jwt_ttl: 0
  name: ''
  product_type: []
  subclaims_delimiters: []
  unique_identifier: ''
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi
monitoring:
  enabled: true
  alerting:
    enabled: false
  interval: 30s
  port: metrics
  path: /metrics
networkPolicy:
  enabled: true
pdb:
  enabled: false
autoscaling:
  enabled: false
