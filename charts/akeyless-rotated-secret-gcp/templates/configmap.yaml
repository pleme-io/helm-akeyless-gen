{{- if .Values.config }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "akeyless-rotated-secret-gcp.fullname" . }}
  labels:
    {{- include "akeyless-rotated-secret-gcp.labels" . | nindent 4 }}
data:
  authentication-credentials: {{ .Values.config.authentication_credentials | quote }}
  auto-rotate: {{ .Values.config.auto_rotate | quote }}
  delete-protection: {{ .Values.config.delete_protection | quote }}
  description: {{ .Values.config.description | quote }}
  gcp-key: {{ .Values.config.gcp_key | quote }}
  gcp-service-account-email: {{ .Values.config.gcp_service_account_email | quote }}
  gcp-service-account-key-id: {{ .Values.config.gcp_service_account_key_id | quote }}
  grace-rotation: {{ .Values.config.grace_rotation | quote }}
  grace-rotation-hour: {{ .Values.config.grace_rotation_hour | quote }}
  grace-rotation-interval: {{ .Values.config.grace_rotation_interval | quote }}
  grace-rotation-timing: {{ .Values.config.grace_rotation_timing | quote }}
  key: {{ .Values.config.key | quote }}
  max-versions: {{ .Values.config.max_versions | quote }}
  name: {{ .Values.config.name | quote }}
  password-length: {{ .Values.config.password_length | quote }}
  rotation-event-in: {{ .Values.config.rotation_event_in | quote }}
  rotation-hour: {{ .Values.config.rotation_hour | quote }}
  rotation-interval: {{ .Values.config.rotation_interval | quote }}
  rotator-type: {{ .Values.config.rotator_type | quote }}
  tags: {{ .Values.config.tags | quote }}
  target-name: {{ .Values.config.target_name | quote }}
{{- end }}
