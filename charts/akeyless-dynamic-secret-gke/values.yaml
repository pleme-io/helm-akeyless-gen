image:
  repository: ghcr.io/pleme-io/placeholder
  tag: latest
  pullPolicy: Always
replicaCount: 1
ports:
- name: http
  containerPort: 8080
  protocol: TCP
service:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
config:
  delete_protection: false
  description: ''
  gke_cluster_endpoint: ''
  gke_cluster_name: ''
  gke_service_account_email: ''
  item_custom_fields: {}
  name: ''
  producer_encryption_key_name: ''
  secure_access_allow_port_forwading: false
  secure_access_cluster_endpoint: ''
  secure_access_delay: 0
  tags: []
  target_name: ''
  user_ttl: ''
secrets:
  gke_account_key: ''
  gke_cluster_cert: ''
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi
monitoring:
  enabled: true
  alerting:
    enabled: false
  interval: 30s
  port: metrics
  path: /metrics
networkPolicy:
  enabled: true
pdb:
  enabled: false
autoscaling:
  enabled: false
