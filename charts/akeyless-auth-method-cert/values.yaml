image:
  repository: ghcr.io/pleme-io/placeholder
  tag: latest
  pullPolicy: Always
replicaCount: 1
ports:
- name: http
  containerPort: 8080
  protocol: TCP
service:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
config:
  access_expires: 0
  allowed_client_type: []
  allowed_cors: ''
  audit_logs_claims: []
  bound_common_names: []
  bound_dns_sans: []
  bound_email_sans: []
  bound_extensions: []
  bound_ips: []
  bound_organizational_units: []
  bound_uri_sans: []
  delete_protection: false
  description: ''
  expiration_event_in: []
  force_sub_claims: false
  gw_bound_ips: []
  jwt_ttl: 0
  name: ''
  product_type: []
  require_crl_dp: false
  revoked_cert_ids: []
  unique_identifier: ''
secrets:
  certificate_data: ''
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi
monitoring:
  enabled: true
  alerting:
    enabled: false
  interval: 30s
  port: metrics
  path: /metrics
networkPolicy:
  enabled: true
pdb:
  enabled: false
autoscaling:
  enabled: false
